<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center mb-4">Student Performance Prediction</h2>

        <form action="/predict" method="post">
            <input class="form-control mb-3" type="number" name="hours" placeholder="Study Hours" required>
            <input class="form-control mb-3" type="number" name="attendance" placeholder="Attendance %" required>
            <input class="form-control mb-3" type="number" name="score" placeholder="Previous Score" required>

            <button class="btn btn-primary w-100">Predict</button>
        </form>

        <h4 class="text-center mt-3 text-success">{{ prediction_text }}</h4>
    </div>
</div>

<div class="text-center mt-3">
    <a href="/data" class="btn btn-info">View Data</a>
    <a href="/download" class="btn btn-success">Download CSV</a>
</div>
<h5 class="text-center text-primary">
    Model Accuracy: {{ accuracy }}%
</h5>
</body>
</html>
