<!DOCTYPE html>
<html>
<head>
    <title>Stored Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center">Stored Student Data</h2>

    <div class="mt-4">
        {{ table|safe }}
    </div>

    <div class="text-center mt-3">
        <a href="/download" class="btn btn-success">Download CSV</a>
        <a href="/" class="btn btn-primary">Back</a>
    </div>
</div>
<div class="text-center mt-4">
    <h4>Performance Chart</h4>
    <img src="{{ chart }}" class="img-fluid" alt="Chart">
</div>
<div class="text-center mt-4">
    <h4>Model Accuracy</h4>
    <p><b>{{ accuracy_value }}%</b></p>
    <img src="{{ accuracy_chart }}" class="img-fluid" alt="Accuracy Chart">
</div>
</body>
</html>
